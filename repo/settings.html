<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>系統設定</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #ddd9d0;
    --accent: #2d6a4f;
    --accent2: #52b788;
    --accent-light: #d8f3dc;
    --warn: #e07b39;
    --warn-light: #fde8d6;
    --danger: #c44536;
    --danger-light: #fde8e6;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #999;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    background: var(--accent);
    color: #fff;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .sidebar-logo h1 { font-size: 15px; font-weight: 700; line-height: 1.4; }
  .sidebar-logo span { font-size: 11px; opacity: 0.6; font-weight: 300; }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 20px; cursor: pointer;
    font-size: 13.5px; font-weight: 500;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.1); }
  .nav-item.active { background: rgba(255,255,255,0.18); border-left-color: #fff; }
  .nav-item .icon { font-size: 17px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.15); font-size: 11px; opacity: 0.5; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar h2 { font-size: 17px; font-weight: 700; }
  .topbar-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .content { padding: 24px 28px; flex: 1; }

  /* ALERT BANNER */
  .alert-banner {
    background: var(--warn-light);
    border: 1px solid #f4b183;
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .alert-banner .alert-icon { font-size: 20px; flex-shrink: 0; }
  .alert-banner h3 { font-size: 13px; font-weight: 700; color: var(--warn); margin-bottom: 6px; }
  .alert-banner ul { font-size: 12.5px; color: #7a4f2a; padding-left: 16px; }
  .alert-banner ul li { margin-bottom: 3px; cursor: pointer; }
  .alert-banner ul li:hover { text-decoration: underline; }

  /* CARDS */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .card-label { font-size: 11.5px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card-value { font-size: 28px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
  .card-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* PANELS */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-header h3 { font-size: 14px; font-weight: 700; }
  .panel-body { padding: 20px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #235c43; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-warn { background: var(--warn); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: var(--danger); color: #fff; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: 12px; font-weight: 500; color: var(--text2); }
  input, select, textarea {
    border: 1px solid var(--border); border-radius: 7px;
    padding: 9px 12px; font-size: 13.5px; font-family: 'Noto Sans TC', sans-serif;
    background: var(--surface); color: var(--text);
    transition: border 0.15s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent2); }
  textarea { resize: vertical; min-height: 80px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); padding: 10px 12px; text-align: left; font-size: 11.5px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); }
  td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--accent-light); color: #1b5e3b; }
  .badge-orange { background: var(--warn-light); color: #7a3e10; }
  .badge-red { background: var(--danger-light); color: #8b1a1a; }
  .badge-gray { background: var(--surface2); color: var(--text3); }

  /* TAG INPUT */
  .tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; background: var(--surface); min-height: 42px; cursor: text; }
  .tag-wrap:focus-within { border-color: var(--accent2); }
  .tag { background: var(--accent-light); color: #1b5e3b; font-size: 12px; padding: 2px 8px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }
  .tag button { background: none; border: none; cursor: pointer; font-size: 13px; color: #1b5e3b; padding: 0; line-height: 1; }
  .tag-input { border: none; outline: none; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; flex: 1; min-width: 80px; background: transparent; }

  /* OUTPUT */
  .output-box {
    background: #fafaf8; border: 1px solid var(--border); border-radius: 8px;
    padding: 18px; font-size: 13.5px; line-height: 1.9;
    white-space: pre-wrap; min-height: 140px; color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    position: relative;
  }
  .output-placeholder { color: var(--text3); font-style: italic; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 18px; font-size: 13px; cursor: pointer; font-weight: 500; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--accent); }

  /* SEARCH */
  .search-bar { position: relative; }
  .search-bar input { padding-left: 36px; }
  .search-bar .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }

  /* STATUS DOT */
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot-green { background: var(--accent2); }
  .dot-orange { background: var(--warn); }
  .dot-red { background: var(--danger); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal-overlay.hidden { display: none !important; pointer-events: none !important; }
  .modal { background: var(--surface); border-radius: 14px; width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 15px; font-weight: 700; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text3); line-height: 1; }

  /* MONTH GRID */
  .month-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
  .month-cell { padding: 10px 8px; border-radius: 8px; text-align: center; font-size: 12px; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
  .month-cell.contacted { background: var(--accent-light); border-color: var(--accent2); color: #1b5e3b; font-weight: 600; }
  .month-cell.current { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
  .month-cell:hover { background: var(--surface2); }

  /* LOADING SPINNER */
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }
  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .mt-3 { margin-top: 12px; }
  .mt-4 { margin-top: 16px; }
  .text-sm { font-size: 12.5px; }
  .text-muted { color: var(--text3); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
<style>
  body { overflow-y: auto; }
  .standalone-wrap { display: flex; flex-direction: column; height: 100vh; }
  .page { display: flex !important; flex-direction: column; flex: 1; }
  .page > .topbar { flex-shrink: 0; }
  .page > .content { flex: 1; overflow-y: auto; }
</style>
</head>
<body>
<div class="standalone-wrap">
<div id="page-settings" class="hidden">
      <div class="topbar">
        <div><h2>⚙️ 系統設定</h2><div class="topbar-sub">個管師資訊、AI 設定、主題顏色</div></div>
        <button type="button" class="btn btn-primary" onclick="saveSettings()">💾 儲存設定</button>
      </div>
      <div class="content">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px">

          <!-- 個管師資訊 -->
          <div class="panel">
            <div class="panel-header"><h3>👤 個管師資訊</h3></div>
            <div class="panel-body" style="display:flex;flex-direction:column;gap:12px">
              <div class="form-group"><label>姓名</label><input type="text" id="s-worker-name" placeholder="林侑萱"></div>
              <div class="form-group"><label>電話</label><input type="text" id="s-worker-phone" placeholder="0902692567"></div>
              <div class="form-group"><label>機構名稱</label><input type="text" id="s-org-name" placeholder="齡活居家長照機構"></div>
              <div class="form-group"><label>服務區域</label><input type="text" id="s-region" placeholder="三重區"></div>
            </div>
          </div>

          <!-- AI 設定 -->
          <div class="panel">
            <div class="panel-header"><h3>✨ AI 設定</h3></div>
            <div class="panel-body" style="display:flex;flex-direction:column;gap:12px">
              <div class="form-group">
                <label>Anthropic API Key</label>
                <input type="password" id="s-api-key" placeholder="sk-ant-...">
                <div style="font-size:11px;color:var(--text3);margin-top:4px">前往 console.anthropic.com 申請，用後請刪除舊 Key 換新</div>
              </div>
              <div id="s-api-status" style="font-size:12px;padding:6px 10px;border-radius:6px;background:var(--surface2)"></div>
              <button type="button" class="btn btn-secondary" onclick="testApiKey()">🔌 測試連線</button>
            </div>
          </div>

          <!-- 主題顏色 -->
          <div class="panel">
            <div class="panel-header"><h3>🎨 主題顏色</h3></div>
            <div class="panel-body">
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px" id="theme-color-grid"></div>
              <div class="form-group">
                <label>自訂顏色</label>
                <div style="display:flex;gap:8px;align-items:center">
                  <input type="color" id="s-custom-color" value="#2d5a27" style="width:48px;height:36px;border:none;padding:2px;border-radius:6px;cursor:pointer">
                  <button type="button" class="btn btn-secondary btn-sm" onclick="applyCustomColor()">套用</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 資料管理 -->
          <div class="panel">
            <div class="panel-header"><h3>🗄️ 資料管理</h3></div>
            <div class="panel-body" style="display:flex;flex-direction:column;gap:10px">
              <button type="button" class="btn btn-secondary" onclick="exportAllData()">📤 匯出全部資料（JSON）</button>
              <div class="form-group">
                <label>匯入備份資料</label>
                <input type="file" id="s-import-file" accept=".json" onchange="importAllData(this)" style="font-size:13px">
              </div>
              <hr style="border:none;border-top:1px solid var(--border)">
              <button type="button" onclick="cleanupArchivedCases()" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--warn);background:var(--warn-light);color:var(--warn);cursor:pointer;font-size:13px;font-weight:600">🗃️ 清除結案個案</button>
              <button type="button" onclick="cleanupOldRecords()" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--warn);background:var(--warn-light);color:var(--warn);cursor:pointer;font-size:13px;font-weight:600">🧹 清除舊聯繫紀錄</button>
              <button type="button" onclick="if(confirm('確定重置所有資料？')){localStorage.clear();location.reload();}" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--danger);background:var(--warn-light);color:var(--danger);cursor:pointer;font-size:13px;font-weight:600">🔄 重置全部資料</button>
            </div>
          </div>

        </div>
      </div>
    </div>
</div>
<script>
// ── 共用 localStorage ──
function loadData(k, def) {
  try { var v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch(e){return def;}
}
function saveData(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

// ── 設定 JS ──
var THEME_PRESETS = [
  { name:'森林綠', accent:'#2d5a27', accent2:'#4a9040' },
  { name:'海洋藍', accent:'#1a5276', accent2:'#2980b9' },
  { name:'暮色紫', accent:'#6c3483', accent2:'#9b59b6' },
  { name:'磚紅', accent:'#922b21', accent2:'#e74c3c' },
  { name:'深棕', accent:'#6e4c1e', accent2:'#b7770d' },
  { name:'石板灰', accent:'#2e4057', accent2:'#4a6880' },
  { name:'青碧', accent:'#0e6655', accent2:'#1abc9c' },
  { name:'玫瑰', accent:'#922b51', accent2:'#e84393' },
];

function settingsInit() {
  var cfg = loadData('sys_config', {});
  document.getElementById('s-worker-name').value  = cfg.workerName  || '';
  document.getElementById('s-worker-phone').value = cfg.workerPhone || '';
  document.getElementById('s-org-name').value     = cfg.orgName     || '';
  document.getElementById('s-region').value       = cfg.region      || '';
  document.getElementById('s-api-key').value      = getApiKey()     || '';
  var grid = document.getElementById('theme-color-grid');
  if (grid) {
    grid.innerHTML = THEME_PRESETS.map(function(t) {
      return '<div onclick="applyTheme(\''+t.accent+'\',\''+t.accent2+'\')" title="'+t.name+'" style="cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid var(--border);transition:all 0.15s" onmouseover="this.style.borderColor=\''+t.accent+'\'" onmouseout="this.style.borderColor=\'var(--border)\'">'
        + '<div style="background:'+t.accent+';height:28px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600">'+t.name+'</div>'
        + '<div style="background:'+t.accent2+';height:8px"></div>'
        + '</div>';
    }).join('');
  }
  updateApiKeyStatus();
}

function saveSettings() {
  var cfg = {
    workerName:  document.getElementById('s-worker-name').value.trim(),
    workerPhone: document.getElementById('s-worker-phone').value.trim(),
    orgName:     document.getElementById('s-org-name').value.trim(),
    region:      document.getElementById('s-region').value.trim(),
  };
  saveData('sys_config', cfg);
  var key = document.getElementById('s-api-key').value.trim();
  if (key) localStorage.setItem('anthropic_api_key', key);
  // apply worker name to home visit fields
  var hn = document.getElementById('hv-worker-name');
  var hp = document.getElementById('hv-worker-phone');
  if (hn && cfg.workerName)  hn.value = cfg.workerName;
  if (hp && cfg.workerPhone) hp.value = cfg.workerPhone;
  updateApiKeyStatus();
  alert('✅ 設定已儲存');
}

function getSysConfig() {
  return loadData('sys_config', { workerName:'林侑萱', workerPhone:'0902692567' });
}

function applyTheme(accent, accent2) {
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--accent2', accent2);
  var accentLight = accent + '18';
  document.documentElement.style.setProperty('--accent-light', accentLight);
  var cfg = loadData('sys_config', {});
  cfg.themeAccent = accent; cfg.themeAccent2 = accent2;
  saveData('sys_config', cfg);
}

function applyCustomColor() {
  var color = document.getElementById('s-custom-color').value;
  applyTheme(color, color + 'cc');
}

function applyStoredTheme() {
  var cfg = loadData('sys_config', {});
  if (cfg.themeAccent) applyTheme(cfg.themeAccent, cfg.themeAccent2 || cfg.themeAccent);
}

function exportAllData() {
  var data = {
    _exported: new Date().toISOString(),
    cases: loadData('cases', []),
    records: loadData('records', []),
    sentences: loadData('sentences', []),
    sys_config: loadData('sys_config', {}),
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '個案管理系統備份_' + new Date().toISOString().substring(0,10) + '.json';
  a.click();
}

function importAllData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!confirm('確定匯入？這將覆蓋目前的個案、紀錄、句型庫資料。')) return;
      if (data.cases)     saveData('cases', data.cases);
      if (data.records)   saveData('records', data.records);
      if (data.sentences) saveData('sentences', data.sentences);
      if (data.sys_config) saveData('sys_config', data.sys_config);
      alert('✅ 匯入成功，重新整理頁面中…');
      location.reload();
    } catch(err) { alert('❌ 格式錯誤：' + err.message); }
  };
  reader.readAsText(file);
}

async function testApiKey() {
  var key = document.getElementById('s-api-key').value.trim() || getApiKey();
  var el = document.getElementById('s-api-status');
  if (!key) { el.textContent = '⚠️ 請先輸入 API Key'; el.style.color = 'var(--warn)'; return; }
  el.textContent = '測試中…'; el.style.color = 'var(--text3)';
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
    });
    var d = await res.json();
    if (d.content) { el.textContent = '✅ 連線成功！API Key 有效'; el.style.color = 'var(--accent)'; }
    else { el.textContent = '❌ ' + (d.error?.message || '連線失敗'); el.style.color = 'var(--danger)'; }
  } catch(err) { el.textContent = '❌ 連線錯誤：' + err.message; el.style.color = 'var(--danger)'; }
}


// ── 啟動 ──
window.onload = function() {
  settingsInit();
  // 套用主題
  var cfg = loadData('sys_config', {});
  if (cfg.theme) applyTheme(cfg.theme);
};

// ── 儲存後通知主頁面 ──
var _origSaveSettings = saveSettings;
function saveSettings() {
  _origSaveSettings();
  var cfg = loadData('sys_config', {});
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type:'settings-saved', cfg:cfg }, '*');
  }
}
</script>
</body>
</html>
